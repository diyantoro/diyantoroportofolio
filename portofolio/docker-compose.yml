version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - portfolio-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=portfolio
      - DB_PASSWORD=portfolio123
      - DB_NAME=portfolio_db
      - JWT_SECRET=change-this-to-a-secure-random-string
      - APP_PORT=8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      - portfolio-network
    volumes:
      - backend-uploads:/app/uploads

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=portfolio_db
      - MYSQL_USER=portfolio
      - MYSQL_PASSWORD=portfolio123
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

networks:
  portfolio-network:
    driver: bridge

volumes:
  mysql-data:
  backend-uploads:
